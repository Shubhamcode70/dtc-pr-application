{% extends 'base.html' %}
{% block title %}Vendor Quotations{% endblock %}
{% block content %}
<div class="card"><h1>Quotations - {{ vendor.name }}</h1>
<table><thead><tr><th>Reference</th><th>Date</th><th>Amount</th></tr></thead><tbody>
{% for q in quotations %}<tr><td>{{ q.id }}</td><td>{{ q.created_at }}</td><td>{{ q.amount|default:'-' }}</td></tr>{% empty %}<tr><td colspan="3">No quotations found.</td></tr>{% endfor %}
</tbody></table></div>
{% endblock %}
