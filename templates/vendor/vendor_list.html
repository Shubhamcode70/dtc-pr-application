{% extends 'base.html' %}
{% block title %}Vendors{% endblock %}
{% block content %}
<div class="card"><h1>Vendors</h1><a class="btn" href="{% url 'vendor:vendor-create' %}">Add Vendor</a></div>
<div class="card"><form method="get"><input type="text" name="search" value="{{ search }}" placeholder="Search vendors" /><button class="btn" type="submit">Search</button></form></div>
<div class="card"><table><thead><tr><th>Name</th><th>Email</th><th>Location</th><th></th></tr></thead><tbody>
{% for vendor in vendors %}<tr><td>{{ vendor.name }}</td><td>{{ vendor.email }}</td><td>{{ vendor.location }}</td><td><a class="btn btn-secondary" href="{% url 'vendor:vendor-detail' pk=vendor.pk %}">View</a></td></tr>{% empty %}<tr><td colspan="4">No vendors found.</td></tr>{% endfor %}
</tbody></table></div>
{% endblock %}
