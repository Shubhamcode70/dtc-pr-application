{% extends 'base.html' %}
{% block title %}Edit User{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <h1>Edit {{ user.username }}</h1>
  <form method="post">{% csrf_token %}
    <label>Role</label>
    <select name="role" required>
      {% for role in roles %}
      <option value="{{ role.id }}" {% if user_profile.role_id == role.id %}selected{% endif %}>{{ role.name }}</option>
      {% endfor %}
    </select>
    <label><input type="checkbox" name="is_approver" {% if user_profile.is_approver %}checked{% endif %} /> Is approver</label>
    <label>Approval limit</label>
    <input type="number" step="0.01" name="approval_limit" value="{{ user_profile.approval_limit }}" />
    <button class="btn" type="submit">Save</button>
  </form>
</div>
{% endblock %}
